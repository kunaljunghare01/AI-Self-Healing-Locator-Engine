# .github/workflows/self-healing-tests.yml
name: AI Self-Healing Locator Engine

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"   # Nightly regression — catches UI drift early
  workflow_dispatch:

jobs:
  self-healing-tests:
    name: Self-Healing Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run Self-Healing Tests
        run: mvn test
        env:
          # Claude API key stored as GitHub secret — never in code
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Upload healed-locators.json so healed mappings persist between runs
      - name: Upload Healed Locators Cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: healed-locators
          path: locator-mappings/healed-locators.json
          retention-days: 90   # Keep 3 months — locator mappings are valuable

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30
